{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}{% endblock %}</title>
    <link href="{% static 'css/style.css' %}" rel="stylesheet">
</head>

<div id="onboarding-box" style="
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: white;
    padding: 20px;
    border-radius: 12px;
    width: 300px;
    display: none;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
">
    <h3>👋 Welcome to Kunet!</h3>
    <p>Do you want to explore yourself or let me guide you?</p>

    <button onclick="startTour()">Guide me</button>
    <button onclick="closeOnboarding()">Explore myself</button>
</div>

<script src="{% static 'js/onboarding.js' %}"></script>


<body>

    {% include 'home/components/navbar.html' %}

    {% block content %}
    {% endblock %}
    <footer style="text-align:center; padding:20px; color:white;">
        © 2026 Kunet
    </footer>

    <script src="{% static 'js/onboarding.js' %}"></script> 
</body>
</html>
