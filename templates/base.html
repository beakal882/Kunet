<!DOCTYPE html>
<html lang="en">
{% load static %}

<head>
    <meta charset="UTF-8">
    <title>Kunet</title>
    <style>
nav a:hover {
    opacity: 0.7;
    transition: opacity 0.2s ease-in-out;
}
</style>

    <style>
@media (max-width: 900px) {
    nav {
        flex-direction: column;
        text-align: center;
    }

    nav img {
        height: 80px; /* still big but fits mobile */
    }

    nav form {
        width: 100%;
    }

    nav div {
        justify-content: center;
        width: 100%;
    }
}
</style>


</head>

    <body style="background: linear-gradient(to right, #0A1A2F, #1E2A3A); margin:0;">


    <!-- Navbar -->
<nav style="
    background-color: #0A1A2F;
    padding: 20px 40px;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
">
    <a href="/" style="flex-shrink: 0; padding: 10px 0;">
        <img src="{% static 'images/kunet_logo.png' %}" 
             alt="Kunet Logo" 
             style="height:80px;">
    </a>

      <!-- Navigation Links -->
    <div style="display: flex; gap: 20px; margin-left: auto;">
    <a href="/videos/" style="color:white;">Videos</a>
    <a href="/about/" style="color:white;">About</a>
    <a href="/contact/" style="color:white;">Contact</a>
    <a href="/search/">
        <img src="{% static 'images/search_icon.jpg' %}" alt="Search" style="height:24px;">
    </a>
    </div>



</nav>


    {% block content %}
    {% endblock %}

    <footer>
        <p>© 2026 Kunet</p>
    </footer>

</body>
</html>
